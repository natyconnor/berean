<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/berean-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <title>Berean</title>
  </head>
  <body style="background:#000">
    <!-- Hero scale matches src/lib/hero-backdrop.ts (pre-bundle splash). -->
    <div id="splash-bg" style="position:fixed;inset:0;z-index:9999">
      <div style="position:absolute;inset:0;background:url(/berean-hero.webp) center/cover no-repeat;transform:scale(1.03)"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.5),rgba(0,0,0,.9));transform:scale(1.03)"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
